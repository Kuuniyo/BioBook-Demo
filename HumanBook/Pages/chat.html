<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Class Chat | HumanBook</title>
    <link rel="stylesheet" href="../css/Style.css" />
</head>
<body>

<!--
╔══════════════════════════════════════════════════════════════════════╗
║  SUPABASE ONE-TIME DATABASE SETUP                                   ║
║  Run this SQL once in: supabase.com → your project → SQL Editor     ║
║                                                                      ║
║  create table chat_messages (                                        ║
║    id         bigint generated always as identity primary key,       ║
║    channel    text not null,                                         ║
║    author     text not null,                                         ║
║    text       text not null,                                         ║
║    created_at timestamptz default now()                              ║
║  );                                                                  ║
║                                                                      ║
║  -- Allow anyone to read and insert (no login needed)               ║
║  alter table chat_messages enable row level security;               ║
║                                                                      ║
║  create policy "anyone can read"                                     ║
║    on chat_messages for select using (true);                        ║
║                                                                      ║
║  create policy "anyone can insert"                                   ║
║    on chat_messages for insert with check (true);                   ║
║                                                                      ║
║  -- Enable realtime for this table                                  ║
║  alter publication supabase_realtime add table chat_messages;       ║
╚══════════════════════════════════════════════════════════════════════╝
-->

<!-- ========== HEADER ========== -->
<header id="site-header">
    <div class="header-inner">
        <a href="../index.html" class="site-logo">HumanBook</a>
        <nav class="header-nav">
            <a href="../index.html" class="nav-link">← All Topics</a>
            <a href="chat.html" class="nav-link active">Class Chat</a>
        </nav>
    </div>
</header>

<!-- ========== CHAT LAYOUT ========== -->
<main id="chat-page">

    <!-- SIDEBAR: channel / topic filter -->
    <aside id="chat-sidebar">
        <h2>Topics</h2>
        <ul id="chat-topic-list">
            <!-- Populated by chat.js from topics.js -->
        </ul>
    </aside>

    <!-- MAIN CHAT AREA -->
    <section id="chat-main">

        <div id="chat-header-bar">
            <h2 id="chat-channel-title">General</h2>
            <span id="chat-message-count" class="chat-count"></span>
        </div>

        <!-- NAME SETUP (shown once, then hidden) -->
        <div id="name-setup-banner" class="name-banner">
            <p>Pick a display name so your classmates know it's you:</p>
            <div class="name-input-row">
                <input type="text" id="username-input" placeholder="Your name" maxlength="30" />
                <button id="set-username-btn" class="btn-primary">Save</button>
            </div>
        </div>

        <!-- MESSAGE LIST -->
        <div id="message-list" role="log" aria-live="polite">
            <div class="chat-empty">Connecting…</div>
        </div>

        <!-- COMPOSE -->
        <form id="chat-form" class="chat-compose" novalidate hidden>
            <span id="composing-as" class="composing-label"></span>
            <div class="compose-row">
          <textarea
                  id="message-input"
                  placeholder="Ask a question or share a tip… (Ctrl+Enter to send)"
                  rows="2"
                  maxlength="1000"
          ></textarea>
                <button type="submit" id="send-btn" class="btn-primary">Send</button>
            </div>
            <div class="compose-meta">
                <span id="char-count" class="char-count">0 / 1000</span>
                <button type="button" id="change-name-btn" class="btn-ghost">Change name</button>
            </div>
        </form>

    </section>
</main>

<!-- ========== FOOTER ========== -->
<footer id="site-footer">
    <p>Made with ❤️ for the MEP class</p>
</footer>

<!-- Supabase JS SDK (CDN, no npm needed) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="../js/topics.js"></script>
<script src="../js/chat.js"></script>
</body>
</html>
